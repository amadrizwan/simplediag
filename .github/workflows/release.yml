name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter simplediag typecheck
      - run: pnpm --filter simplediag check:license
      - run: pnpm --filter simplediag test
      - run: pnpm --filter simplediag build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/simplediag/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm via Trusted Publishers (OIDC)
        working-directory: packages/simplediag
        run: npm publish --no-git-checks --access public
